<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>3-Statement Drill</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f1923;
    --paper: #f5f0e8;
    --card: #fffdf8;
    --accent: #1a4fd6;
    --accent-light: #e8eeff;
    --green: #0d6e4f;
    --green-light: #e6f4f0;
    --amber: #92400e;
    --amber-light: #fef3c7;
    --rule: #d4cfc4;
    --muted: #6b6560;
    --shadow: 0 2px 12px rgba(15,25,35,0.08), 0 1px 3px rgba(15,25,35,0.06);
    --shadow-lg: 0 8px 32px rgba(15,25,35,0.12), 0 2px 8px rgba(15,25,35,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 16px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    letter-spacing: -0.3px;
    line-height: 1;
  }
  header h1 span { color: #7ba3ff; }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #9ca3af;
    white-space: nowrap;
  }
  .progress-bar-outer {
    width: 60px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: #7ba3ff;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── SECTION TABS ── */
  .tabs-wrap {
    background: var(--ink);
    padding: 0 20px 12px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.2px;
  }
  .tab.active {
    background: #7ba3ff;
    border-color: #7ba3ff;
    color: var(--ink);
    font-weight: 600;
  }

  /* ── MAIN ── */
  main {
    padding: 16px 16px 100px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 12px;
    border: 1px solid rgba(212,207,196,0.6);
    transition: box-shadow 0.2s;
  }

  .card-q {
    padding: 18px 18px 14px;
    cursor: pointer;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 7px;
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }
  .q-text {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    line-height: 1.45;
    color: var(--ink);
    flex: 1;
  }
  .q-chevron {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    margin-top: 2px;
    color: var(--muted);
    transition: transform 0.25s ease;
  }
  .card.open .q-chevron { transform: rotate(180deg); }

  /* ── EXPANDABLE BODY ── */
  .card-body {
    display: none;
    padding: 0 18px 18px;
    border-top: 1px solid var(--rule);
  }
  .card.open .card-body { display: block; }

  /* answer textarea */
  .answer-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 14px 0 6px;
  }
  textarea {
    width: 100%;
    min-height: 90px;
    padding: 10px 12px;
    border: 1.5px solid var(--rule);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--paper);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #b0a99e; }

  /* reveal button */
  .btn-reveal {
    width: 100%;
    margin-top: 14px;
    padding: 13px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-reveal:active { transform: scale(0.98); }
  .btn-reveal.shown { background: var(--muted); }

  /* ── ANSWER PANEL ── */
  .answer-panel {
    display: none;
    margin-top: 14px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--rule);
  }
  .answer-panel.visible { display: block; }

  .statement-block {
    padding: 12px 14px;
    border-bottom: 1px solid var(--rule);
  }
  .statement-block:last-child { border-bottom: none; }

  .statement-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .statement-block.is .statement-label { color: #1a4fd6; }
  .statement-block.cfs .statement-label { color: #0d6e4f; }
  .statement-block.bs .statement-label { color: #7c3aed; }
  .statement-block.why .statement-label { color: var(--amber); }

  .statement-block.is { background: #f0f4ff; }
  .statement-block.cfs { background: #f0faf6; }
  .statement-block.bs { background: #f5f0ff; }
  .statement-block.why { background: var(--amber-light); }

  .statement-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink);
  }
  .statement-block.why .statement-text { color: #78350f; font-style: italic; }

  /* ── NAV BUTTONS ── */
  .nav-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn-nav {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: 1.5px solid var(--rule);
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-nav:active { background: var(--paper); }
  .btn-nav.next { background: var(--accent); color: white; border-color: var(--accent); }

  /* ── SECTION HEADER ── */
  .section-header {
    padding: 20px 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--ink);
    letter-spacing: -0.3px;
  }
  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--rule);
    padding: 3px 8px;
    border-radius: 20px;
  }

  /* ── SCORE STRIP ── */
  .score-strip {
    background: var(--ink);
    color: var(--paper);
    padding: 10px 16px;
    border-radius: 12px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .score-label { font-size: 12px; color: rgba(255,255,255,0.6); }
  .score-nums {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    display: flex;
    gap: 14px;
  }
  .score-seen { color: #7ba3ff; }
  .score-left { color: rgba(255,255,255,0.4); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 15px; line-height: 1.6; }

  /* ── SHUFFLE / RESET ── */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
    padding: 0 0 4px;
  }
  .btn-tool {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--rule);
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-tool:active { background: var(--paper); }

  /* hide scrollbar on tabs */
  .tabs-wrap { -ms-overflow-style: none; }
</style>
</head>
<body>

<header>
  <h1>3-Statement <span>Drill</span></h1>
  <div class="progress-wrap">
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
    <span class="progress-text" id="progressText">0 / 38</span>
  </div>
</header>

<div class="tabs-wrap" id="tabsWrap"></div>

<main id="main"></main>

<script>
const QUESTIONS = [
  // ── SECTION 1 ──
  { id:1, section:"IS Items", q:"Depreciation increases by $10.",
    is:"Operating Income falls by $10. Pre-Tax Income falls by $10. Net Income falls by $6 (at 40% tax).",
    cfs:"Net Income is down $6. Depreciation is non-cash — add it back: +$10. Cash Flow from Operations is up $4. Net change in cash: +$4.",
    bs:"Cash is up $4. PP&E is down $10. Net Assets: −$6. Retained Earnings down $6, so Shareholders' Equity is down $6. Both sides balance.",
    why:"Depreciation is non-cash but tax-deductible. No cash leaves the business — the tax saving ($10 × 40% = $4) means cash actually increases. That's the core insight." },

  { id:2, section:"IS Items", q:"Amortisation increases by $10.",
    is:"Operating Income falls by $10. Pre-Tax Income falls by $10. Net Income falls by $6.",
    cfs:"Net Income down $6. Add back amortisation +$10. CFO up $4. Net change in cash: +$4.",
    bs:"Cash up $4. Intangible assets down $10. Net Assets: −$6. SE down $6 via Retained Earnings. Balances.",
    why:"Identical mechanics to depreciation — just applied to intangible assets (patents, customer lists) instead of physical ones. Non-cash, tax-deductible, creates a tax shield." },

  { id:3, section:"IS Items", q:"Revenue increases by $10 — cash sale.",
    is:"Revenue up $10. Operating Income up $10. Pre-Tax Income up $10. Net Income up $6.",
    cfs:"Net Income up $6. No other adjustments. CFO up $6. Net change in cash: +$6.",
    bs:"Cash up $6. Assets up $6. SE up $6 via Retained Earnings. Balances.",
    why:"The simplest case. Cash arrives, revenue is earned at the same time, profit flows through cleanly. No timing differences." },

  { id:4, section:"IS Items", q:"Revenue increases by $10 — credit sale (cash not yet received).",
    is:"Revenue up $10. Net Income up $6. Revenue is recognised when earned, not when cash arrives.",
    cfs:"Net Income up $6. But AR increases by $10 (asset up = cash down): −$10. CFO down $4. Net change in cash: −$4.",
    bs:"Cash down $4. AR up $10. Net Assets: +$6. SE up $6. Balances.",
    why:"Accrual accounting: you booked profit but the cash is still with the customer. The company is more profitable on paper but worse off on cash short-term. This is why profitable companies can still have cash flow problems." },

  { id:5, section:"IS Items", q:"Cost of Goods Sold (COGS) increases by $10.",
    is:"Gross Profit down $10. Operating Income down $10. Net Income down $6.",
    cfs:"Net Income down $6. No adjustments. CFO down $6. Net change in cash: −$6.",
    bs:"Cash down $6. Assets down $6. SE down $6. Balances.",
    why:"COGS is a cash operating expense — no timing difference, no non-cash element. Every statement reflects the hit cleanly." },

  { id:6, section:"IS Items", q:"Operating Expenses increase by $10 (e.g. SG&A).",
    is:"Operating Income down $10. Net Income down $6.",
    cfs:"Net Income down $6. CFO down $6. Net change in cash: −$6.",
    bs:"Cash down $6. Assets down $6. SE down $6. Balances.",
    why:"Same as COGS — a straightforward cash operating expense. Profit drops, cash drops, equity drops." },

  { id:7, section:"IS Items", q:"Interest Expense increases by $10.",
    is:"Operating Income is unchanged — interest sits below the operating line. Pre-Tax Income down $10. Net Income down $6.",
    cfs:"Net Income down $6. CFO down $6. Net change in cash: −$6.",
    bs:"Cash down $6. Assets down $6. SE down $6. Balances.",
    why:"Interest expense is a financing cost, not an operating one — it appears below EBIT. It's still real cash. Don't confuse interest expense (IS hit) with principal repayment (not an IS item)." },

  { id:8, section:"IS Items", q:"Interest Income increases by $10.",
    is:"Pre-Tax Income up $10. Net Income up $6. (Operating Income typically unchanged — below the line.)",
    cfs:"Net Income up $6. CFO up $6. Net change in cash: +$6.",
    bs:"Cash up $6. Assets up $6. SE up $6. Balances.",
    why:"Mirror image of interest expense — cash earned on surplus cash or investments. The reward for having a strong balance sheet." },

  { id:9, section:"IS Items", q:"Tax rate increases from 40% to 50%. Pre-Tax Income is $100.",
    is:"Pre-Tax Income unchanged at $100. Net Income falls from $60 to $50 — a drop of $10.",
    cfs:"Net Income down $10. CFO down $10. Net change in cash: −$10.",
    bs:"Cash down $10. Assets down $10. SE down $10. Balances.",
    why:"Higher taxes mean more cash to the government, less in the business. Flows through cleanly — no non-cash element." },

  { id:10, section:"IS Items", q:"Stock-Based Compensation (SBC) increases by $10.",
    is:"Operating Expenses up $10. Operating Income down $10. Net Income down $6.",
    cfs:"Net Income down $6. SBC is non-cash — add it back: +$10. CFO up $4. Net change in cash: +$4.",
    bs:"Cash up $4. SE: Retained Earnings down $6 (lower NI), but Common Stock / APIC up $10 (shares issued). Net SE: +$4. Assets up $4, SE up $4. Balances.",
    why:"SBC is tricky — it hits equity in two directions. Retained Earnings falls (via NI), but APIC rises (shares granted). No cash leaves; you gave away a slice of ownership instead. Net equity effect is positive." },

  { id:11, section:"IS Items", q:"An asset is written down by $10 (impairment charge).",
    is:"Pre-Tax Income down $10. Net Income down $6.",
    cfs:"Net Income down $6. Write-down is non-cash — add it back: +$10. CFO up $4. Net change in cash: +$4.",
    bs:"Cash up $4. Asset down $10. Net Assets: −$6. SE down $6. Balances.",
    why:"A write-down is an accounting recognition — no cash actually leaves. Tax-deductible, so the tax saving ($4) means cash goes UP despite the IS loss. Banks can post huge write-downs and still maintain cash." },

  { id:12, section:"IS Items", q:"Accrued Compensation increases by $10 (expense recognised, not yet paid in cash).",
    is:"Operating Expenses up $10. Pre-Tax Income down $10. Net Income down $6.",
    cfs:"Net Income down $6. Accrued Comp is a liability going up (source of cash): +$10. CFO up $4. Net change in cash: +$4.",
    bs:"Cash up $4. Accrued Compensation (liability) up $10. Retained Earnings down $6. Net L+E: +$4. Assets up $4. Balances.",
    why:"You've recognised the expense (employees earned it) but haven't paid yet. The liability captures what you owe. Cash hasn't left — you're temporarily better off on cash. When you pay, the liability falls and cash falls equally — no IS impact then." },

  { id:13, section:"IS Items", q:"Deferred Revenue increases by $10 (cash received, service not yet delivered).",
    is:"No impact. Revenue is not recognised until earned.",
    cfs:"No NI change. Deferred Revenue (liability up): +$10. CFO up $10. Net change in cash: +$10.",
    bs:"Cash up $10. Deferred Revenue (liability) up $10. Assets up $10, Liabilities up $10. Balances.",
    why:"You have the cash but haven't earned it yet — think annual subscriptions or gift cards. Until you deliver, it's a liability. IS stays clean; this is purely a balance sheet event for now." },

  { id:14, section:"IS Items", q:"$10 of previously Deferred Revenue is now recognised (service delivered).",
    is:"Revenue up $10. Net Income up $6.",
    cfs:"Net Income up $6. Deferred Revenue falls (liability down, use of cash): −$10. CFO down $4. Net change in cash: −$4.",
    bs:"Cash down $4. Deferred Revenue (liability) down $10. SE up $6. Net L+E: −$4. Assets: −$4. Balances.",
    why:"The cash was collected in a prior period — there's no new cash now. You're converting a liability into revenue. The CFS shows a drag because the liability is being released." },

  // ── SECTION 2 ──
  { id:15, section:"BS Changes", q:"Inventory increases by $10, paid in cash.",
    is:"No impact. Nothing has been sold.",
    cfs:"Inventory (asset up): −$10. CFO down $10. Net change in cash: −$10.",
    bs:"Inventory up $10. Cash down $10. Both assets — they cancel. Total Assets unchanged. Balances.",
    why:"Buying inventory is just swapping one asset for another — cash for goods. Until you sell, there's no IS event. Cash has been converted into a less liquid form." },

  { id:16, section:"BS Changes", q:"Inventory increases by $10, purchased on credit (Accounts Payable increases).",
    is:"No impact.",
    cfs:"Inventory (asset up): −$10. AP (liability up): +$10. These offset. CFO unchanged. Net change in cash: $0.",
    bs:"Inventory up $10 (Asset). AP up $10 (Liability). Both sides up $10. Balances.",
    why:"You got the goods but deferred the cash payment. Suppliers are effectively lending you money short-term. Cash impact comes later when you pay AP." },

  { id:17, section:"BS Changes", q:"Accounts Receivable increases by $10 (from a new credit sale).",
    is:"Revenue up $10. Net Income up $6.",
    cfs:"Net Income up $6. AR (asset up): −$10. CFO down $4. Net change in cash: −$4.",
    bs:"Cash down $4. AR up $10. Net Assets: +$6. SE up $6. Balances.",
    why:"Same as Q4 — phrased from the BS angle. Profit is booked but cash hasn't arrived. AR is money owed to you." },

  { id:18, section:"BS Changes", q:"Accounts Receivable decreases by $10 (customer pays an existing invoice).",
    is:"No impact. Revenue was already recognised when the sale was made.",
    cfs:"AR (asset down): +$10. CFO up $10. Net change in cash: +$10.",
    bs:"Cash up $10. AR down $10. Both assets — cancel out. Total Assets unchanged. Balances.",
    why:"Collecting cash is not a new revenue event — just converting one asset (receivable) into another (cash). The IS was already updated at the time of sale." },

  { id:19, section:"BS Changes", q:"Accounts Payable increases by $10 (new purchase on credit).",
    is:"No impact.",
    cfs:"AP (liability up): +$10. CFO up $10. Net change in cash: +$10.",
    bs:"Cash up $10. AP up $10 (Liability). Assets up $10, Liabilities up $10. Balances.",
    why:"AP rising means you're deferring cash payments — suppliers are lending you money. Temporary cash benefit. When you pay, AP falls and cash falls together." },

  { id:20, section:"BS Changes", q:"Accounts Payable decreases by $10 (you pay off an existing payable in cash).",
    is:"No impact. The expense was recognised when goods were received.",
    cfs:"AP (liability down): −$10. CFO down $10. Net change in cash: −$10.",
    bs:"Cash down $10. AP down $10 (Liability). Both sides down $10. Balances.",
    why:"Paying off AP is settling a pre-existing debt. No new P&L event — just cash leaving to extinguish a liability." },

  { id:21, section:"BS Changes", q:"Prepaid Expense increases by $10 (cash paid in advance).",
    is:"No impact. Expense not recognised until the service period.",
    cfs:"Prepaid (asset up): −$10. CFO down $10. Net change in cash: −$10.",
    bs:"Cash down $10. Prepaid Expense up $10. Both assets — cancel. Total Assets unchanged. Balances.",
    why:"You pay first, expense later. Common examples: insurance, rent. Cash has left but no P&L impact yet. Mirror image of accrued expenses." },

  { id:22, section:"BS Changes", q:"A $10 Prepaid Expense is now recognised (service period has passed).",
    is:"Operating Expenses up $10. Net Income down $6.",
    cfs:"Net Income down $6. Prepaid (asset down): +$10. CFO up $4. Net change in cash: +$4.",
    bs:"Cash up $4. Prepaid down $10. Net Assets: −$6. SE down $6. Balances.",
    why:"The cash already left in a prior period — no cash impact now. You're releasing the prepaid asset as an expense. NI falls but cash goes up due to the tax saving." },

  { id:23, section:"BS Changes", q:"PP&E increases by $10 — purchased with cash (Capex).",
    is:"No immediate impact. Cost is capitalised; hits IS gradually via depreciation over the asset's life.",
    cfs:"No CFO change. Capex −$10 under Cash Flow from Investing. Net change in cash: −$10.",
    bs:"Cash down $10. PP&E up $10. Both assets — cancel. Total Assets unchanged. Balances.",
    why:"Capex is not expensed immediately — that's the key difference vs. an operating expense. You're buying a long-lived asset. Cash goes out now under CFI; IS impact comes later through depreciation." },

  { id:24, section:"BS Changes", q:"PP&E increases by $10 — purchased with newly raised debt.",
    is:"No immediate impact.",
    cfs:"Capex −$10 (CFI). Debt raised +$10 (CFF). These offset. Net change in cash: $0.",
    bs:"PP&E up $10 (Asset). Debt up $10 (Liability). Both sides up $10. Balances.",
    why:"Debt-financed capex — acquire the asset without spending net cash because you borrowed the money. Future IS impact: depreciation on the asset, interest on the debt." },

  { id:25, section:"BS Changes", q:"Goodwill Impairment charge of $10.",
    is:"Pre-Tax Income down $10. Net Income down $6.",
    cfs:"Net Income down $6. Add back impairment (non-cash): +$10. CFO up $4. Net change in cash: +$4.",
    bs:"Cash up $4. Goodwill down $10. Net Assets: −$6. SE down $6. Balances.",
    why:"Goodwill impairment is non-cash — management is writing down the premium paid for an acquisition. Tax-deductible, so creates a $4 cash benefit despite the IS loss." },

  // ── SECTION 3 ──
  { id:26, section:"Financing", q:"The company raises $10 of new debt.",
    is:"No impact. Borrowing is not revenue.",
    cfs:"Debt issuance +$10 under CFF. Net change in cash: +$10.",
    bs:"Cash up $10. Debt up $10 (Liability). Assets up $10, Liabilities up $10. Balances.",
    why:"Borrowing creates cash and creates an obligation. No profit — IS untouched. Future IS impact will come through interest expense." },

  { id:27, section:"Financing", q:"The company repays $10 of debt principal.",
    is:"No impact. This is a classic trick question — debt principal repayment is NOT an IS expense. Only interest hits the IS.",
    cfs:"Debt repayment −$10 under CFF. Net change in cash: −$10.",
    bs:"Cash down $10. Debt down $10 (Liability). Both sides down $10. Balances.",
    why:"Repaying principal just reverses the original borrowing — eliminating both a liability and an asset (cash). The IS was affected when interest was paid, but principal repayment is purely a BS/CFS event." },

  { id:28, section:"Financing", q:"The company issues $10 of new equity.",
    is:"No impact. Issuing shares is not income.",
    cfs:"Equity issuance +$10 under CFF. Net change in cash: +$10.",
    bs:"Cash up $10. Common Stock / APIC up $10 (SE). Assets up $10, SE up $10. Balances.",
    why:"Similar to raising debt — cash in, balance sheet grows, IS untouched. Key difference: no future interest expense or repayment obligation, but existing shareholders are diluted." },

  { id:29, section:"Financing", q:"The company buys back $10 of its own stock.",
    is:"No IS impact. EPS may rise (fewer shares) but line items are unchanged.",
    cfs:"Share repurchase −$10 under CFF. Net change in cash: −$10.",
    bs:"Cash down $10. Treasury Stock up $10 — a contra-equity account, reducing SE. Net SE: −$10. Assets down $10, SE down $10. Balances.",
    why:"Buybacks reverse an equity issuance — cash leaves and shares are retired. No IS impact, but BS shrinks and equity per remaining share increases." },

  { id:30, section:"Financing", q:"The company pays a $10 cash dividend.",
    is:"No impact. Dividends are a distribution of after-tax earnings, not a business expense.",
    cfs:"Dividends paid −$10 under CFF. Net change in cash: −$10.",
    bs:"Cash down $10. Retained Earnings down $10 (SE). Assets down $10, SE down $10. Balances.",
    why:"Dividends distribute already-taxed cash — that's why they don't appear on the IS. Balance sheet shrinks as cash and retained earnings fall together." },

  { id:31, section:"Financing", q:"$10 of debt is converted to equity.",
    is:"No impact. Pure balance sheet restructuring — no cash and no P&L event.",
    cfs:"No cash in or out. Net change in cash: $0.",
    bs:"Debt down $10 (Liability). SE up $10 (Equity). Assets completely unchanged. Balances.",
    why:"Common in distressed restructurings — lenders forgive debt in exchange for ownership. The company's obligations shrink, equity grows, no cash moves. Purely an accounting rearrangement." },

  // ── SECTION 4 ──
  { id:32, section:"Complex", q:"Apple buys $100 of factories with debt. At year-end (Year 1): depreciation is 10%/yr, interest rate is 10%. Walk through all three statements.",
    is:"Depreciation $10 hits Operating Income. Interest $10 hits Pre-Tax Income. Pre-Tax Income down $20. Net Income down $12.",
    cfs:"Net Income down $12. Add back depreciation +$10. CFO down $2. CFI and CFF unchanged (acquisition and debt raise already recorded at start). Net change in cash: −$2.",
    bs:"Cash down $2. PP&E down $10 (net book value now $90). Net Assets: −$12. Debt unchanged (no principal paid). SE down $12 via Retained Earnings. Balances.",
    why:"Three moving parts: (1) acquisition — already recorded, (2) Year 1 depreciation hits IS/CFS/BS, (3) Year 1 interest hits IS/CFS/BS. Work each separately. Depreciation adds back on CFS; interest is real cash out. Net cash is only −$2 despite a $12 NI hit — the depreciation add-back cushions it." },

  { id:33, section:"Complex", q:"A company sells inventory for $20 cash. The inventory originally cost $10.",
    is:"Revenue up $20. COGS up $10. Gross Profit up $10. Net Income up $6.",
    cfs:"Net Income up $6. Inventory falls by $10 (asset down = source of cash): +$10. CFO up $16. Net change in cash: +$16.",
    bs:"Cash up $16. Inventory down $10. Net Assets: +$6. SE up $6 via Retained Earnings. Balances.",
    why:"Two balance sheet effects: inventory disappears and cash comes in above cost. CFS picks up both — NI (+$6) and the inventory release (+$10). This is why companies liquidating inventory can generate strong cash flow." },

  { id:34, section:"Complex", q:"A company buys inventory for $10 cash, then sells all of it for $20 cash — both in the same period.",
    is:"Revenue up $20. COGS up $10. Net Income up $6.",
    cfs:"Net Income up $6. Inventory bought and sold in same period — net inventory change is zero. CFO up $6. Net change in cash: +$6.",
    bs:"Cash up $6. Inventory net unchanged. Assets up $6. SE up $6. Balances.",
    why:"When both purchase and sale occur in the same period, working capital changes cancel out. Only the net profit remains. Contrast with Q33 where only the sale happens — there you pick up $16 of cash." },

  { id:35, section:"Complex", q:"A bank takes a $100 asset write-down.",
    is:"Pre-Tax Income down $100. Net Income down $60.",
    cfs:"Net Income down $60. Add back write-down (non-cash): +$100. CFO up $40. Net change in cash: +$40.",
    bs:"Cash up $40. Asset down $100. Net Assets: −$60. SE down $60 via Retained Earnings. Balances.",
    why:"Non-cash charges improve cash despite crushing the IS. Tax saving on $100 write-down at 40% = $40 cash stays in business. This is why banks can post massive losses and not immediately collapse — the write-down itself generates no cash outflow." },

  { id:36, section:"Complex", q:"A company capitalises a $10 cost rather than expensing it. What is different compared to expensing it?",
    is:"If capitalised: no IS impact this period. If expensed: OpEx up $10, Net Income down $6 this period.",
    cfs:"If capitalised: no CFO impact; −$10 appears under CFI (treated as capex). If expensed: CFO down $6. Net cash impact is the same (−$10 total) but shows in a different section.",
    bs:"If capitalised: new asset of $10 on BS; cash down $10 via CFI — Assets net unchanged. If expensed: no new asset; Cash down $6, SE down $6.",
    why:"Capitalising defers the IS hit — you spread the cost via future depreciation rather than taking it all now. Total cash effect is identical over the asset's life. This is a lever companies use to manage reported earnings. Expensing is more conservative." },

  { id:37, section:"Complex", q:"A company sells PP&E for $10. The asset's book value is $10 — no gain or loss.",
    is:"No impact. Proceeds equal book value, so no gain or loss to recognise.",
    cfs:"Asset sale proceeds +$10 under Cash Flow from Investing (CFI). Net change in cash: +$10.",
    bs:"Cash up $10. PP&E down $10. Both assets — cancel. Total Assets unchanged. Balances.",
    why:"Selling at book value is a clean asset swap — fixed asset converted back to cash with no P&L event. Only the CFS (CFI) and the asset-to-cash swap on the BS are affected." },

  { id:38, section:"Complex", q:"A company sells PP&E for $15. The asset's book value is $10 — a $5 gain.",
    is:"Gain of $5 recognised. Pre-Tax Income up $5. Net Income up $3.",
    cfs:"Net Income up $3. The $5 gain is non-operating — subtract it from CFO: −$5. Full $15 sale proceeds appear in CFI: +$15. Net change in cash: +$15 (−$5 CFO adj + $15 CFI proceeds, and NI already includes the $3 after-tax gain which partly flows through).",
    bs:"Cash up $15. PP&E down $10. Net Assets: +$5. SE up $3 (NI) + $2 goes to taxes payable (40% of $5 gain). Total L+E: +$5. Both sides up $5. Balances.",
    why:"The gain is real income and gets taxed. The CFS trick: full $15 proceeds go to CFI, but because Net Income already includes the $5 gain, you must subtract it from CFO to avoid double-counting. This is one of the few scenarios that requires adjustments in both CFO and CFI." },
];

const SECTIONS = ["All", "IS Items", "BS Changes", "Financing", "Complex"];

let activeSection = "All";
let seenIds = new Set();
let openId = null;
let revealedIds = new Set();

function filtered() {
  if (activeSection === "All") return QUESTIONS;
  return QUESTIONS.filter(q => q.section === activeSection);
}

function updateProgress() {
  const qs = filtered();
  const seen = qs.filter(q => seenIds.has(q.id)).length;
  const pct = qs.length ? Math.round(seen / qs.length * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${seen} / ${qs.length}`;
}

function renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  wrap.innerHTML = '';
  SECTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (s === activeSection ? ' active' : '');
    btn.textContent = s;
    btn.onclick = () => { activeSection = s; openId = null; renderAll(); };
    wrap.appendChild(btn);
  });
}

function renderAll() {
  renderTabs();
  updateProgress();
  const main = document.getElementById('main');
  main.innerHTML = '';

  const qs = filtered();
  if (!qs.length) {
    main.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>No questions in this section.</p></div>';
    return;
  }

  // Score strip
  const seen = qs.filter(q => seenIds.has(q.id)).length;
  const strip = document.createElement('div');
  strip.className = 'score-strip';
  strip.innerHTML = `<span class="score-label">Your progress</span><div class="score-nums"><span class="score-seen">✓ ${seen} reviewed</span><span class="score-left">${qs.length - seen} remaining</span></div>`;
  main.appendChild(strip);

  // Toolbar
  const toolbar = document.createElement('div');
  toolbar.className = 'toolbar';
  const shuffleBtn = document.createElement('button');
  shuffleBtn.className = 'btn-tool';
  shuffleBtn.innerHTML = '⇄ Shuffle';
  shuffleBtn.onclick = () => {
    // shuffle in place
    for (let i = QUESTIONS.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [QUESTIONS[i], QUESTIONS[j]] = [QUESTIONS[j], QUESTIONS[i]];
    }
    openId = null;
    renderAll();
  };
  const resetBtn = document.createElement('button');
  resetBtn.className = 'btn-tool';
  resetBtn.innerHTML = '↺ Reset progress';
  resetBtn.onclick = () => { seenIds.clear(); revealedIds.clear(); openId = null; renderAll(); };
  toolbar.appendChild(shuffleBtn);
  toolbar.appendChild(resetBtn);
  main.appendChild(toolbar);

  // Group by section if "All"
  let groups = {};
  qs.forEach(q => {
    if (!groups[q.section]) groups[q.section] = [];
    groups[q.section].push(q);
  });

  Object.entries(groups).forEach(([section, sqs]) => {
    if (activeSection === "All") {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.innerHTML = `<h2>${section}</h2><span class="section-count">${sqs.length} questions</span>`;
      main.appendChild(hdr);
    }
    sqs.forEach(q => main.appendChild(buildCard(q)));
  });
}

function buildCard(q) {
  const card = document.createElement('div');
  card.className = 'card' + (openId === q.id ? ' open' : '');
  card.id = 'card-' + q.id;

  // Question row
  const qRow = document.createElement('div');
  qRow.className = 'card-q';
  qRow.innerHTML = `
    <span class="q-num">Q${q.id}</span>
    <span class="q-text">${q.q}</span>
    <svg class="q-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  `;
  qRow.onclick = () => toggleCard(q.id);
  card.appendChild(qRow);

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  // Textarea
  const aLabel = document.createElement('div');
  aLabel.className = 'answer-label';
  aLabel.textContent = 'Your answer';
  body.appendChild(aLabel);

  const ta = document.createElement('textarea');
  ta.placeholder = 'Write your answer across all three statements before revealing...';
  ta.id = 'ta-' + q.id;
  body.appendChild(ta);

  // Reveal button
  const revBtn = document.createElement('button');
  revBtn.className = 'btn-reveal' + (revealedIds.has(q.id) ? ' shown' : '');
  revBtn.id = 'revbtn-' + q.id;
  revBtn.innerHTML = revealedIds.has(q.id)
    ? '<span>Hide answer</span>'
    : '<span>Reveal answer + explanation</span> <span>→</span>';
  revBtn.onclick = () => toggleReveal(q.id, q);
  body.appendChild(revBtn);

  // Answer panel
  const panel = document.createElement('div');
  panel.className = 'answer-panel' + (revealedIds.has(q.id) ? ' visible' : '');
  panel.id = 'panel-' + q.id;
  panel.innerHTML = `
    <div class="statement-block is">
      <div class="statement-label">Income Statement</div>
      <div class="statement-text">${q.is}</div>
    </div>
    <div class="statement-block cfs">
      <div class="statement-label">Cash Flow Statement</div>
      <div class="statement-text">${q.cfs}</div>
    </div>
    <div class="statement-block bs">
      <div class="statement-label">Balance Sheet</div>
      <div class="statement-text">${q.bs}</div>
    </div>
    <div class="statement-block why">
      <div class="statement-label">Why — the reasoning</div>
      <div class="statement-text">${q.why}</div>
    </div>
  `;
  body.appendChild(panel);

  // Nav row
  const nav = document.createElement('div');
  nav.className = 'nav-row';
  const qs = filtered();
  const idx = qs.findIndex(x => x.id === q.id);
  if (idx > 0) {
    const prev = document.createElement('button');
    prev.className = 'btn-nav';
    prev.innerHTML = '← Prev';
    prev.onclick = () => { openId = qs[idx-1].id; seenIds.add(qs[idx-1].id); renderAll(); scrollToCard(qs[idx-1].id); };
    nav.appendChild(prev);
  }
  if (idx < qs.length - 1) {
    const next = document.createElement('button');
    next.className = 'btn-nav next';
    next.innerHTML = 'Next →';
    next.onclick = () => { openId = qs[idx+1].id; seenIds.add(qs[idx+1].id); renderAll(); scrollToCard(qs[idx+1].id); };
    nav.appendChild(next);
  }
  body.appendChild(nav);

  card.appendChild(body);
  return card;
}

function toggleCard(id) {
  if (openId === id) {
    openId = null;
  } else {
    openId = id;
    seenIds.add(id);
  }
  renderAll();
  if (openId) scrollToCard(openId);
}

function toggleReveal(id, q) {
  if (revealedIds.has(id)) {
    revealedIds.delete(id);
  } else {
    revealedIds.add(id);
  }
  // Re-render just the button and panel without full re-render
  const panel = document.getElementById('panel-' + id);
  const btn = document.getElementById('revbtn-' + id);
  if (!panel || !btn) return;
  if (revealedIds.has(id)) {
    panel.classList.add('visible');
    btn.classList.add('shown');
    btn.innerHTML = '<span>Hide answer</span>';
  } else {
    panel.classList.remove('visible');
    btn.classList.remove('shown');
    btn.innerHTML = '<span>Reveal answer + explanation</span> <span>→</span>';
  }
  updateProgress();
}

function scrollToCard(id) {
  setTimeout(() => {
    const el = document.getElementById('card-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

renderAll();
</script>
