<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PE Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0c10;--surface:#13151c;--surface2:#1c1f2a;--border:#252836;--accent:#c8a96e;--accent2:#7eb8d4;--accent3:#d47e7e;--accent4:#7ed4a8;--accent5:#b07ed4;--text:#e8e6e1;--text-muted:#7a7d8a;--text-dim:#4a4d5a;--r:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,169,110,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(200,169,110,.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.app{max-width:720px;margin:0 auto;padding:0 16px 120px;position:relative;z-index:1}
.hdr{padding:24px 0 14px;border-bottom:1px solid var(--border)}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.25em;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
.hdr h1{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,38px);font-weight:900;line-height:1.05;letter-spacing:-.02em}
.hdr h1 span{color:var(--accent)}
.overall-row{display:flex;align-items:center;gap:10px;padding:10px 0 4px;flex-wrap:wrap}
.obar-wrap{flex:1;min-width:100px;background:var(--surface2);border-radius:3px;height:4px;overflow:hidden}
.obar{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.otext{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted);white-space:nowrap}
.otext span{color:var(--accent)}
.stats-row{display:flex;gap:14px;padding:4px 0 8px;flex-wrap:wrap}
.spill{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.spill span{font-weight:600}
.s-done{color:var(--accent4)}.s-rev{color:var(--accent3)}.s-tot{color:var(--accent)}
.tabs-wrap{overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;white-space:nowrap}
.tab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:12px 13px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;white-space:nowrap}
.tab:hover{color:var(--text-muted)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tc{display:inline-block;margin-left:4px;padding:1px 5px;border-radius:8px;background:var(--surface2);font-size:9px}
.tdone{color:var(--accent4);font-size:9px;margin-left:2px}
.topic-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 0 6px;gap:8px;flex-wrap:wrap}
.topic-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
.topic-prog-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tpbar-wrap{width:72px;background:var(--surface2);border-radius:3px;height:4px;overflow:hidden}
.tpbar{height:100%;border-radius:3px;transition:width .4s}
.tptext{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted);white-space:nowrap}
.topic-desc{font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:12px}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.vbtn{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:7px 13px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s}
.vbtn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,169,110,.08)}
.vbtn:hover:not(.active){border-color:var(--text-dim);color:var(--text-muted)}
.fchip{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s}
.fchip:hover{border-color:var(--text-muted);color:var(--text)}
.fchip.fa{background:rgba(200,169,110,.1);border-color:var(--accent);color:var(--accent)}
.fchip.fr{background:rgba(212,126,126,.1);border-color:var(--accent3);color:var(--accent3)}
.fchip.fd{background:rgba(126,212,168,.1);border-color:var(--accent4);color:var(--accent4)}
.deck-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dctr{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-muted)}
.dctr span{color:var(--text);font-weight:600}
.dnav-btns{display:flex;gap:6px}
.nbtn{font-family:'IBM Plex Mono',monospace;font-size:13px;width:40px;height:40px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.nbtn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.nbtn:disabled{opacity:.3;cursor:default}
.fc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.fc-top{padding:20px 20px 14px}
.fc-meta{display:flex;align-items:center;gap:8px;margin-bottom:11px;flex-wrap:wrap}
.dbadge{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:3px}
.db{background:rgba(126,212,168,.1);color:var(--accent4)}
.da{background:rgba(212,126,126,.1);color:var(--accent3)}
.dp{background:rgba(176,126,212,.1);color:var(--accent5)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
.sdot.done{background:var(--accent4)}.sdot.review{background:var(--accent3)}
.slabel{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.1em}
.fc-q{font-family:'Playfair Display',serif;font-size:clamp(17px,3.2vw,22px);font-weight:700;line-height:1.4;color:var(--text)}
.fc-acts{display:flex;gap:8px;padding:0 20px 14px;flex-wrap:wrap}
.btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:11px 16px;border-radius:8px;border:1px solid;cursor:pointer;transition:all .15s;flex:1;min-width:110px;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-p{background:rgba(200,169,110,.1);color:var(--accent);border-color:rgba(200,169,110,.4)}
.btn-p:hover{background:rgba(200,169,110,.2);border-color:var(--accent)}
.btn-s{background:var(--surface2);color:var(--text-muted);border-color:var(--border)}
.btn-s:hover{border-color:var(--text-muted);color:var(--text)}
.btn-m{background:rgba(126,184,212,.08);color:var(--accent2);border-color:rgba(126,184,212,.3)}
.btn-m:hover{background:rgba(126,184,212,.18);border-color:var(--accent2)}
.mc-sec{border-top:1px solid var(--border);padding:14px 20px;display:none}
.mc-sec.vis{display:block}
.mc-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
.mc-opts{display:flex;flex-direction:column;gap:7px}
.mc-opt{padding:11px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;line-height:1.5;color:var(--text-muted);background:var(--surface2);transition:all .15s;text-align:left;width:100%;font-family:'IBM Plex Sans',sans-serif;display:flex;align-items:flex-start;gap:8px}
.mc-opt:hover:not(:disabled){border-color:var(--accent2);color:var(--text)}
.mc-opt.cor{border-color:var(--accent4);background:rgba(126,212,168,.1);color:var(--accent4)}
.mc-opt.wrg{border-color:var(--accent3);background:rgba(212,126,126,.06);color:var(--text-dim);text-decoration:line-through;text-decoration-color:rgba(212,126,126,.4)}
.mc-opt:disabled{cursor:default}
.opt-letter{font-family:'IBM Plex Mono',monospace;font-size:9px;color:inherit;flex-shrink:0;margin-top:2px;opacity:.7}
.mc-fb{margin-top:9px;font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;display:none;padding:8px 12px;border-radius:6px}
.mc-fb.vis{display:block}
.mc-fb.cfb{color:var(--accent4);background:rgba(126,212,168,.08);border:1px solid rgba(126,212,168,.2)}
.mc-fb.wfb{color:var(--accent3);background:rgba(212,126,126,.06);border:1px solid rgba(212,126,126,.2)}
.mc-reveal-btn{margin-top:10px;width:100%}
.ans-sec{border-top:1px solid var(--border);display:none}
.ans-sec.vis{display:block}
.ans-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);padding:14px 20px 0}
.ans-body{padding:10px 20px 18px}
.ans-body p{font-size:13.5px;line-height:1.75;color:#c0bfba;margin-bottom:10px}
.ans-body p:last-child{margin-bottom:0}
.ans-body ul,.ans-body ol{padding-left:18px;margin-bottom:10px}
.ans-body li{font-size:13.5px;line-height:1.75;color:#c0bfba;margin-bottom:4px}
.ans-body strong{color:var(--text);font-weight:600}
.ans-body .formula{font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px 14px;margin:10px 0;color:var(--accent2);line-height:1.6}
.mark-bar{display:none;padding:10px 20px 14px;gap:7px;border-top:1px dashed var(--border);flex-wrap:wrap}
.mark-bar.vis{display:flex}
.mark-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim);width:100%;letter-spacing:.08em;text-transform:uppercase}
.mbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:10px 14px;border-radius:8px;border:1px solid;cursor:pointer;transition:all .15s;flex:1;min-width:80px}
.mbtn-done{background:rgba(126,212,168,.08);color:var(--accent4);border-color:rgba(126,212,168,.3)}
.mbtn-done:hover,.mbtn-done.act{background:rgba(126,212,168,.2);border-color:var(--accent4)}
.mbtn-rev{background:rgba(212,126,126,.08);color:var(--accent3);border-color:rgba(212,126,126,.3)}
.mbtn-rev:hover,.mbtn-rev.act{background:rgba(212,126,126,.2);border-color:var(--accent3)}
.mbtn-clr{background:transparent;color:var(--text-dim);border-color:var(--border);flex:unset;min-width:unset;padding:10px 12px}
.mbtn-clr:hover{color:var(--text-muted);border-color:var(--text-dim)}
.dots-row{display:flex;justify-content:center;gap:5px;margin-top:10px;flex-wrap:wrap;padding:0 4px}
.pdot{width:8px;height:8px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:transform .1s}
.pdot:hover{transform:scale(1.4)}
.pdot-more{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-dim)}
.list-view{display:flex;flex-direction:column;gap:5px}
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.lcard.s-done{border-left:3px solid var(--accent4)}
.lcard.s-rev{border-left:3px solid var(--accent3)}
.lcard-hdr{display:flex;align-items:flex-start;gap:9px;padding:13px 15px;cursor:pointer;user-select:none}
.lq{flex:1;font-size:13.5px;font-weight:500;line-height:1.45;color:var(--text)}
.lchev{flex-shrink:0;color:var(--text-dim);font-size:11px;margin-top:3px;transition:transform .25s}
.lcard.open .lchev{transform:rotate(180deg)}
.lcard.open{border-color:var(--accent)}
.lbody{display:none}
.lcard.open .lbody{display:block}
.empty{text-align:center;padding:60px 20px}
.empty p{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text-dim)}
.stbtn{position:fixed;bottom:76px;right:14px;width:42px;height:42px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-size:15px;display:none;align-items:center;justify-content:center;z-index:100;transition:all .15s}
.stbtn.vis{display:flex}
.stbtn:hover{border-color:var(--accent);color:var(--accent)}
.reset-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;margin-left:auto}
.reset-btn:hover{border-color:var(--accent3);color:var(--accent3)}
@media(max-width:480px){.app{padding:0 12px 100px}.fc-q{font-size:17px}.fc-acts{flex-direction:column}.fc-acts .btn{min-width:unset}}
@media(min-width:540px){.mc-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="eyebrow">Technical Interview Preparation</div>
  <h1>PE <span>Flashcards</span></h1>
  <div class="overall-row">
    <div class="obar-wrap"><div class="obar" id="obar" style="width:0%"></div></div>
    <div class="otext"><span id="oDone">0</span> / <span id="oTot">0</span> done</div>
  </div>
  <div class="stats-row">
    <div class="spill">Total <span class="s-tot" id="sTot">0</span></div>
    <div class="spill">Done <span class="s-done" id="sDone">0</span></div>
    <div class="spill">Review <span class="s-rev" id="sRev">0</span></div>
    <div class="spill">Unseen <span id="sUnseen">0</span></div>
    <button class="reset-btn" onclick="resetProgress()" title="Reset all progress">↺ Reset</button>
  </div>
</div>
<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<div id="content"></div>
</div>
<button class="stbtn" id="stbtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<script>
const CATEGORIES = [
  {
    id: 'accounting',
    label: 'Accounting',
    color: '#c8a96e',
    number: '01',
    description: 'Financial statements, linkages, and accounting mechanics. Foundational for all PE technical interviews — expect deep follow-ups on how items flow through the three statements.',
    questions: [
      {
        q: 'Walk me through the 3 financial statements.',
        a: `<p><strong>Income Statement:</strong> Shows revenue, expenses, and net income over a period. Starts at Revenue, deducts COGS to get Gross Profit, then SG&A/OpEx to get EBIT, then interest and taxes to arrive at Net Income.</p>
<p><strong>Balance Sheet:</strong> A snapshot at a point in time. Assets (Cash, AR, Inventory, PP&E) = Liabilities (AP, Debt) + Shareholders' Equity. Must always balance.</p>
<p><strong>Cash Flow Statement:</strong> Starts with Net Income, adjusts for non-cash items (D&A, SBC) and working capital changes to get CFO; adds capex for CFI; adds debt/equity transactions for CFF. Net change in cash reconciles to Balance Sheet.</p>`,
        s: `Income Statement: Shows revenue, expenses, and net income over a period.`,
        diff: 'basic'
      },
      {
        q: 'How do the 3 statements link together?',
        a: `<p>Net Income flows from the Income Statement into Retained Earnings on the Balance Sheet (via Shareholders' Equity) and into the top line of the Cash Flow Statement.</p>
<p>Working capital changes on the Cash Flow Statement reflect movements in Balance Sheet operating items (AR, Inventory, AP, etc.). CapEx reduces Cash and increases PP&E. Debt issuance/repayment changes Cash and the Debt balance. The ending Cash balance on the CFS equals Cash on the Balance Sheet.</p>`,
        s: `Net Income flows from the Income Statement into Retained Earnings on the Balance Sheet (via Shareholders' Equity) and into the top line of the Cash Flow Statement.`,
        diff: 'basic'
      },
      {
        q: 'Walk me through how Depreciation going up by $10 affects all 3 statements.',
        a: `<p><strong>Income Statement:</strong> D&A ↑ $10 → EBIT ↓ $10 → Pretax Income ↓ $10 → Tax savings of $4 (at 40%) → Net Income ↓ $6.</p>
<p><strong>Cash Flow Statement:</strong> Net Income ↓ $6, but D&A add-back ↑ $10 → CFO net ↑ $4 → Cash ↑ $4.</p>
<p><strong>Balance Sheet:</strong> PP&E ↓ $10, Cash ↑ $4 → Assets ↓ $6. Retained Earnings ↓ $6 → Equity ↓ $6. Both sides balance.</p>`,
        s: `Income Statement: D&A ↑ $10 → EBIT ↓ $10 → Pretax Income ↓ $10 → Tax savings of $4 (at 40%) → Net Income ↓ $6.`,
        diff: 'basic'
      },
      {
        q: 'If Depreciation is non-cash, why does it affect the cash balance?',
        a: `<p>Depreciation is tax-deductible. Even though no cash leaves the business when you record D&A, it reduces taxable income, which in turn reduces the cash you pay in taxes. The cash impact is the tax shield: D&A × tax rate.</p>`,
        s: `Even though no cash leaves the business when you record D&A, it reduces taxable income, which in turn reduces the cash you pay in taxes.`,
        diff: 'basic'
      },
      {
        q: 'What happens to the 3 statements if a company raises $100M in debt?',
        a: `<p><strong>Income Statement:</strong> No immediate impact (interest expense only accrues over time).</p>
<p><strong>Balance Sheet:</strong> Cash ↑ $100M; Debt ↑ $100M. Both sides of the balance sheet increase by $100M.</p>
<p><strong>Cash Flow Statement:</strong> Cash from Financing ↑ $100M; ending Cash ↑ $100M.</p>`,
        s: `Balance Sheet: Cash ↑ $100M; Debt ↑ $100M.`,
        diff: 'basic'
      },
      {
        q: 'What is the difference between cash-based and accrual accounting?',
        a: `<p><strong>Cash-based:</strong> Revenue and expenses are recognised when cash is actually received or paid.</p>
<p><strong>Accrual-based:</strong> Revenue is recognised when earned (regardless of cash receipt) and expenses when incurred (regardless of cash payment). Both IFRS and US GAAP require accrual accounting for financial reporting. This is why Profit ≠ Cash Flow — items like Trade Receivables and Trade Payables create timing differences between recognition and cash settlement.</p>`,
        s: `Accrual-based: Revenue is recognised when earned (regardless of cash receipt) and expenses when incurred (regardless of cash payment).`,
        diff: 'basic'
      },
      {
        q: 'What is Goodwill and how does it arise?',
        a: `<p>Goodwill arises in an acquisition when the purchase price exceeds the fair value of the target's identifiable net assets. It represents intangible value — brand, customer relationships, synergies expected by the buyer.</p>
<div class="formula">Goodwill = Purchase Price − Fair Value of Identifiable Net Assets (Assets − Liabilities)</div>
<p>Under <strong>IFRS 3</strong>, Goodwill is <strong>not amortised</strong> but must be tested for impairment at least annually (IAS 36). Any impairment charge flows through the Income Statement as a non-cash loss and cannot be reversed. Once written down, Goodwill stays at the impaired value.</p>
<p><em>GAAP note: US GAAP (ASC 350) also does not amortise Goodwill and requires annual impairment testing — the treatment is essentially the same as IFRS on this point, though the impairment testing methodology differs slightly.</em></p>`,
        s: `Goodwill arises in an acquisition when the purchase price exceeds the fair value of the target's identifiable net assets.`,
        diff: 'basic'
      },
      {
        q: 'Walk me through what happens to all 3 statements when a company capitalises vs. expenses a $100 cost.',
        a: `<p><strong>Expensing immediately:</strong> Operating expenses ↑ £100 → Pre-Tax Profit ↓ £100 → Net Profit ↓ £60 (40% tax). Cash ↓ £60 after the tax benefit. Assets (cash) ↓ £60, Equity ↓ £60.</p>
<p><strong>Capitalising:</strong> Creates an asset on the Balance Sheet (under IFRS, IAS 16 for PP&E or IAS 38 for intangibles). In Year 1: Cash ↓ £100 (shown in CFI as capital expenditure), PP&E or Intangible Asset ↑ £100. In subsequent years: depreciation or amortisation reduces the asset and flows through the Income Statement. Over time, total effect on Net Profit is the same — only the timing differs.</p>
<p>Capitalising flatters near-term profit but creates future depreciation charges. Under IFRS, intangible assets can only be capitalised if strict criteria are met (IAS 38): the asset must be identifiable, controlled by the entity, and expected to generate future economic benefits. Research costs must always be expensed; development costs may be capitalised once technical and commercial feasibility is established.</p>`,
        s: `Expensing immediately: Operating expenses ↑ £100 → Pre-Tax Profit ↓ £100 → Net Profit ↓ £60 (40% tax).`,
        diff: 'advanced'
      },
      {
        q: 'What is the difference between finance leases and operating leases?',
        a: `<p>Under <strong>IFRS 16</strong> (effective from 2019), the distinction between lease types changed significantly for lessees.</p>
<p><strong>IFRS 16 — Lessee accounting:</strong> Almost all leases must now be recognised on the balance sheet. The lessee records a <em>Right-of-Use (ROU) asset</em> and a corresponding <em>lease liability</em> at the present value of future lease payments. The ROU asset is depreciated (typically straight-line) and interest accrues on the liability — meaning the P&L shows depreciation plus interest rather than a straight rental charge. This affects EBITDA positively (rent moves below EBITDA into depreciation and interest) and inflates reported EBITDA.</p>
<p><strong>Exception — Short-term and low-value leases:</strong> IFRS 16 allows companies to elect to keep leases of 12 months or less, and leases of low-value assets (e.g. laptops), off-balance sheet as a simple expense. These are the only remaining "operating leases" under IFRS 16.</p>
<p><strong>Practical PE impact:</strong> IFRS 16 inflates EBITDA because rent expense (previously above EBITDA) moves into depreciation of the ROU asset and interest on the lease liability. Always check whether EBITDA is pre- or post-IFRS 16 — an "adjusted" EBITDA that removes the IFRS 16 uplift is sometimes more comparable when benchmarking against older deals or US targets.</p>
<p><em>GAAP note: Under US GAAP (ASC 842), all leases are also on-balance sheet, but the P&L treatment differs: operating leases show a single straight-line lease cost in operating expenses (not split into depreciation and interest), while finance leases (equivalent to the old capital leases) split into front-loaded interest plus depreciation. This means EBITDA under US GAAP operating lease treatment is NOT inflated the same way as IFRS 16.</em></p>`,
        s: `These are the only remaining "operating leases" under IFRS 16.`,
        diff: 'advanced'
      },
      {
        q: 'How do Net Operating Losses (NOLs) affect the financial statements?',
        a: `<p>Under IFRS, tax losses that can be carried forward to reduce future taxable income give rise to a <strong>Deferred Tax Asset (DTA)</strong>, governed by IAS 12.</p>
<p><strong>Simplified approach:</strong> Reduce taxable income in future periods by the carried-forward loss, and calculate taxes on the lower base.</p>
<p><strong>Correct IFRS approach:</strong> Recognise a DTA on the Balance Sheet representing the future tax benefit (loss × tax rate). As the loss is utilised against future profits, the DTA is drawn down through the Income Statement (a tax credit). Under IAS 12, a DTA is only recognised to the extent it is <em>probable</em> that sufficient future taxable profit will be available to utilise it — if not, the DTA is not recognised (or is written down), which itself creates a charge.</p>
<p><em>GAAP note: US GAAP (ASC 740) uses the same DTA concept but applies a "more likely than not" threshold for recognition, and any unrecognised portion is captured via a valuation allowance rather than simply not recording the asset.</em></p>`,
        s: `Under IFRS, tax losses that can be carried forward to reduce future taxable income give rise to a Deferred Tax Asset (DTA) , governed by IAS 12.`,

<p>Key rule: the item must hit Operating Profit to be an add-back for EBITDA. Items below the EBIT line (e.g. finance income) are not added back. In PE, buyers and sellers frequently negotiate what qualifies — this is the basis of "adjusted EBITDA" and can be contentious in due diligence.</p>`,

        q: 'What is a Deferred Tax Liability (DTL) and when does it arise in an LBO?',
        a: `<p>Under IAS 12, a DTL arises when the carrying amount of an asset for accounting purposes exceeds its tax base — meaning the company will pay more tax in the future than the current period's Income Statement implies.</p>
<p><strong>In an LBO/acquisition context:</strong> When acquired assets (PP&E, customer relationships, brand, technology) are written up to fair value through purchase price allocation (IFRS 3), the accounting value exceeds the tax base (the tax authorities do not recognise the step-up). This creates taxable temporary differences → a DTL is recorded. As the written-up assets depreciate or amortise for book purposes, the temporary difference unwinds and the DTL reduces.</p>
<p><strong>Practical impact:</strong> The DTL increases the liabilities on the opening LBO balance sheet, reducing net assets and increasing Goodwill. It unwinds over the useful lives of the acquired intangibles (often 5–15 years), reducing the DTL balance and creating a deferred tax credit each year.</p>
<p><em>GAAP note: US GAAP (ASC 740) applies the same mechanics. One key difference is the 338(h)(10) election available in the US, which allows a share acquisition to be treated as an asset purchase for tax — eliminating the DTL entirely in exchange for an immediate step-up in tax basis. This concept does not exist under UK/European tax law.</em></p>`,

      {
        q: 'What is the difference between operating leverage and financial leverage, and how do they interact in a PE deal?',
        a: `<p><strong>Operating leverage</strong> is the sensitivity of EBIT to changes in revenue, driven by the ratio of fixed to variable costs. A business with 70% fixed costs will see EBIT fall 3x faster than revenue in a downturn — and rise 3x faster in an upturn. Classic high-operating-leverage businesses: airlines, hotels, manufacturers.</p>
<p><strong>Financial leverage</strong> is the amplification of equity returns from using debt. Because interest is fixed, every incremental pound of EBITDA above debt service belongs entirely to equity holders — amplifying returns in good times, destroying equity in bad times.</p>
<p><strong>The dangerous interaction:</strong> Stacking high operating leverage with high financial leverage creates a double-amplifier. A 15% revenue decline in a high-fixed-cost business might eliminate 40–50% of EBITDA — which then wipes out all interest coverage and triggers covenant breaches. This is exactly why PE firms demand stable, recurring revenue streams before applying maximum leverage. Airlines, retailers, and hotels — all high operating leverage — rarely survive heavy LBO capital structures through a cycle.</p>
<p><strong>Practical test:</strong> Before finalising leverage in an LBO, stress-test a 20% revenue decline scenario. If the business still covers its interest 1.5x or more, leverage is appropriate. If it falls below 1.0x, you are gambling on macro stability.</p>`,

        a: `<p>Under <strong>IFRS 3 (Business Combinations)</strong>, when an acquisition closes the acquirer must allocate the purchase price across all identifiable assets and liabilities at their acquisition-date fair values, with any residual becoming Goodwill.</p>

        q: 'Walk me through the major line items of a Cash Flow Statement.',
        a: `<p>Under <strong>IAS 7</strong>, the Cash Flow Statement has three sections. Under IFRS, companies may choose the direct or indirect method for operating cash flows — the indirect method (starting from profit) is most common in practice.</p>
<p><strong>Operating Activities:</strong> Starts with Profit for the period (or Operating Profit), then adjusts for non-cash items (add back depreciation, amortisation, impairments, share-based payments) and changes in working capital (trade receivables, inventory, trade payables, provisions). The result is cash generated from operations. <em>Note: under IFRS, interest paid and tax paid may be classified here or in financing/investing activities — companies must disclose consistently.</em></p>
<p><strong>Investing Activities:</strong> Covers capital expenditure on PP&E and intangibles (negative), proceeds from asset disposals (positive), and consideration paid for acquisitions. Net investing cash flow is almost always negative for a growing business.</p>

      {
        q: 'What is working capital? How is it used?',
        a: `<p><strong>Working Capital (WC) = Current Assets − Current Liabilities.</strong> It measures the short-term liquidity of a business — whether it can cover its near-term obligations with its near-term assets.</p>
<p><strong>Operating NWC</strong> (the version PE firms care about) excludes cash and debt: (Current Assets − Cash) − (Current Liabilities − Debt). This isolates the cash tied up in the operating cycle — receivables, inventory, and payables.</p>
<p><strong>How it is used in PE:</strong> (1) <strong>Leverage sizing</strong> — WC-intensive businesses consume cash as they grow, reducing FCF available for debt service. (2) <strong>Deal normalisation</strong> — buyers negotiate a WC peg at close; if actual WC is below the normalised level, the purchase price is adjusted down. (3) <strong>Cash flow modelling</strong> — changes in NWC flow through the CFS: if AR or inventory increases, it is a cash drag; if AP rises, it is a cash benefit. (4) <strong>Red flag analysis</strong> — rising DSO (days sales outstanding) signals collection problems; falling DPO signals supplier pressure.</p>
<p><strong>Negative WC (attractive for LBOs):</strong> Subscription or prepay businesses collect cash before delivering, creating negative WC — meaning growth actually generates cash rather than consuming it. This is a highly desirable LBO characteristic.</p>`,

        q: 'What is the difference between a balance sheet and an income statement?',
        a: `<p>They answer fundamentally different questions and cover different time horizons.</p>
<p><strong>Income Statement (P&L):</strong> Covers a <em>period of time</em> (e.g. the year ended 31 Dec). Shows revenue, costs, and the resulting profit or loss. It tells you how the business performed over that period. Key lines: Revenue → Gross Profit → EBITDA → EBIT → Pre-Tax Income → Net Income.</p>
<p><strong>Balance Sheet:</strong> A <em>snapshot at a single point in time</em> (e.g. as at 31 Dec). Shows what the company owns (Assets) and owes (Liabilities), with the residual belonging to shareholders (Equity). The fundamental equation: Assets = Liabilities + Shareholders' Equity must always hold.</p>
<p><strong>How they link:</strong> Net Income from the IS flows into Retained Earnings on the BS (via Shareholders' Equity), increasing or decreasing book equity. The Cash Flow Statement bridges the two — explaining why cash on the BS changed from one period to the next.</p>

      {
        q: 'A company has had positive EBITDA for the past 10 years, but it recently went bankrupt. How could this happen?',
        a: `<p>This is a classic question testing whether you understand the gap between profitability and cash generation. Several mechanisms:</p>
<p><strong>1. Massive debt burden:</strong> An LBO or recapitalisation left the company with interest and principal payments that absorbed all cash flow even with positive EBITDA. EBITDA of £50M but £70M of annual debt service = bankruptcy regardless of profitability. EBITDA ignores interest; free cash flow does not.</p>
<p><strong>2. High capex requirements:</strong> A capital-intensive business (infrastructure, manufacturing) may have EBITDA of £100M but require £120M of annual maintenance capex to keep assets operational. Net FCF is negative — the business is burning cash despite positive EBITDA.</p>
<p><strong>3. Working capital deterioration:</strong> Rapid growth or a business slowdown traps cash in receivables and inventory. A company growing 40% per year might be funding £50M of additional WC annually — starving the business of operating liquidity despite good margins.</p>
<p><strong>4. Non-cash revenue inflation:</strong> Revenue and EBITDA were recognised on accrual but cash was never collected — counterparties defaulted or payment terms were abused. EBITDA looked healthy; cash was not arriving.</p>
<p><strong>5. Covenant breach:</strong> Even a company generating positive EBITDA can be forced into technical default if it breaches a leverage or coverage covenant — triggering debt acceleration before the cash problem becomes obvious.</p>

      {
        q: 'What are deferred tax assets (DTAs) and deferred tax liabilities (DTLs), and how do they arise?',
        a: `<p>Under <strong>IAS 12</strong>, deferred taxes arise from <em>temporary differences</em> — the gap between the carrying amount of an asset or liability in the financial statements and its tax base. The tax actually paid in cash may be more or less than the tax charge shown in the Income Statement.</p>
<p><strong>Deferred Tax Liability (DTL):</strong> The carrying amount of an asset exceeds its tax base — meaning you will pay more tax in the future than the current period implies. Classic examples: (1) PP&E depreciated more slowly for book than for tax (accelerated tax allowances mean you claim the deduction now; book profit is higher now); (2) in acquisitions, assets written up to fair value (IFRS 3 PPA) exceed their tax base — creating a taxable temporary difference and a DTL.</p>
<p><strong>Deferred Tax Asset (DTA):</strong> The carrying amount of a liability exceeds its tax base — meaning you have paid more tax now than the current period implies, or you have losses to carry forward. Classic examples: (1) tax losses (the IFRS equivalent of NOLs) carried forward reduce future taxable income; (2) provisions and accruals recognised for book purposes but not yet deductible for tax. Under IAS 12, DTAs are only recognised to the extent it is <em>probable</em> that sufficient future taxable profit will be available to utilise them.</p>
<p><strong>PE relevance:</strong> In an LBO, the PPA (IFRS 3) creates a large DTL from intangible write-ups. DTAs from unrecognised tax losses can be highly valuable — they reduce future cash taxes and improve FCF available for debt repayment. Always model cash taxes separately from book tax expense.</p>
<p><em>GAAP note: US GAAP (ASC 740) uses the same logic but the recognition threshold is "more likely than not" rather than "probable," and unrecognised DTAs are captured via a valuation allowance. The 338(h)(10) election in the US allows a share acquisition to be treated as an asset purchase for tax, eliminating the DTL — no equivalent mechanism exists under UK/European tax law.</em></p>`,

        q: 'Why do you need to add Non-Controlling Interest (Minority Interest) to Enterprise Value?',
        a: `<p>Under IFRS 10 (Consolidated Financial Statements), if a parent controls a subsidiary but does not own 100% of it, it fully consolidates 100% of that subsidiary's results — including the share attributable to non-controlling interests (NCI, previously called minority interests).</p>
<p>This means 100% of the subsidiary's EBITDA flows through into the consolidated Income Statement — even the portion belonging to other shareholders. When you calculate EV/EBITDA, the denominator includes 100% of the subsidiary's earnings. To make the numerator consistent, EV must also include 100% of the subsidiary's value — including the NCI's share.</p>

<p><strong>Example:</strong> Parent owns 70% of Sub. Sub has £100M EBITDA. Consolidated EBITDA = £100M. If you omit NCI from EV, you are valuing only 70% of the Sub's assets but dividing by 100% of its EBITDA — understating the true EV/EBITDA multiple.</p>

      {
        q: 'If you knew a company\'s net income, how would you work out its cash flows?',
        a: `<p>Under IAS 7, the indirect method starts from Profit for the Period and makes three categories of adjustments to arrive at operating cash flows:</p>
<p><strong>Step 1 — Add back non-cash charges:</strong> Depreciation (IAS 16), amortisation (IAS 38), impairment losses (IAS 36), and share-based payment charges (IFRS 2) all reduced profit but no cash left the business. Add them back in full. This is often the largest adjustment — a capital-intensive business might add back £50M+ of depreciation.</p>
<p><strong>Step 2 — Adjust for working capital changes:</strong> Increases in current assets (trade receivables, inventories, prepayments) consumed cash but did not reduce profit — subtract them. Increases in current liabilities (trade payables, accruals, deferred income) provided cash but did not increase profit — add them. This reflects the gap between accrual recognition and actual cash settlement.</p>
<p><strong>Step 3 — Result = Cash from Operating Activities.</strong></p>
<p>Then to get to Free Cash Flow: subtract Capex (purchases of PP&E and intangibles, shown in investing activities). Operating Cash Flow − Capex = Unlevered Free Cash Flow.</p>
<p><strong>Common shortcut in PE:</strong> If you only have EBITDA: EBITDA − Cash Taxes − Capex ± ΔWorking Capital = UFCF. If starting from Net Profit: Net Profit + D&A + other non-cash ± ΔWC = Operating Cash Flow; Operating CF − Capex = UFCF.</p>`,

      {
        q: 'A firm is using LIFO accounting and prices on its supplies start decreasing. What are the effects on the Income Statement, Balance Sheet, and Cash Flow Statement?',
        a: `<p><strong>Important context:</strong> LIFO (Last In, First Out) is <strong>prohibited under IFRS</strong> (IAS 2 does not permit it). This question is therefore primarily relevant in a US GAAP context. However, understanding it demonstrates knowledge of inventory accounting and its financial statement effects — and interviewers may still ask it.</p>
<p>Under LIFO, the most recently purchased inventory is assumed to be sold first. When supply prices are <em>decreasing</em>, the newest inventory is the cheapest — so COGS falls under LIFO, and older (more expensive) inventory remains on the balance sheet.</p>
<p><strong>Income Statement:</strong> COGS decreases → Gross Profit increases → EBIT increases → Pre-Tax Income increases → Net Income increases.</p>
<p><strong>Balance Sheet:</strong> Inventory value increases (the remaining stock is the older, more expensive inventory). Assets increase; Retained Earnings increase via higher Net Income → Shareholders' Equity increases.</p>
<p><strong>Cash Flow Statement:</strong> Higher Net Income flows in at the top. Cash outflows for purchases fall (cheaper inventory bought). Net operating cash flows increase. Higher taxes (on higher pre-tax income) are a partial offset.</p>
<p><em>IFRS-relevant note: Under IFRS and UK GAAP, companies use FIFO or weighted-average cost. When prices fall under FIFO, COGS also falls (you sell your oldest, most expensive stock first, but the newest cheaper stock will feed through to COGS progressively) — the direction of the effect is the same as LIFO when prices are falling, though the magnitude differs.</em></p>`,

        q: 'What differentiates companies in different industries? What metrics would you use?',
        a: `<p>Different industries have fundamentally different economics — capital intensity, revenue model, cost structure, and growth dynamics vary enormously. The right metrics differ accordingly.</p>
<p><strong>Technology / SaaS:</strong> ARR (Annual Recurring Revenue), NRR (Net Revenue Retention), CAC payback period, gross margin (typically 70–80%), Rule of 40 (growth rate + EBITDA margin ≥ 40). Key differentiator: recurring, sticky revenue with high incremental margins. Valued on EV/ARR or EV/Revenue, not EV/EBITDA.</p>
<p><strong>Financial Services / Insurance:</strong> Combined ratio (claims + expenses / premiums), return on equity, loss ratio, investment yield. EBITDA is meaningless — use P/E or P/Book. Regulated capital requirements constrain leverage differently from industrial companies.</p>
<p><strong>Retail / Consumer:</strong> Same-store sales growth (organic performance ex new stores), inventory turnover, gross margin per SKU, store EBITDA. Working capital is often negative (customer pays before supplier is paid). Highly cyclical — discretionary vs non-discretionary matters enormously for LBO resilience.</p>
<p><strong>Healthcare:</strong> EBITDA margins (often 15–25% for services), revenue per bed/patient, payor mix (government vs private), regulatory approval risk for pharma. Highly defensive and recession-resistant — attractive for leverage.</p>
<p><strong>Industrials / Manufacturing:</strong> EBITDA with careful capex deduction (high maintenance capex is a key drag), order backlog, capacity utilisation, fixed vs variable cost mix. High operating leverage — revenue declines hit EBITDA disproportionately.</p>
<p><strong>The PE framework:</strong> Any industry analysis should end with: (1) what is the FCF conversion? (2) how cyclical/defensive is revenue? (3) what leverage is appropriate? These translate industry characteristics into deal structure decisions.</p>`,

      {
        q: 'What is the difference between LTM and NTM EBITDA, and which do PE buyers use when pricing a deal?',
        a: `<p><strong>LTM (Last Twelve Months):</strong> Trailing EBITDA calculated from the most recent 12 months of actual results. It is verifiable, auditable, and does not require forecasting assumptions — making it the defensible baseline for deal pricing in discussions with sellers and banks.</p>
<p><strong>NTM (Next Twelve Months):</strong> Forward EBITDA based on management projections or analyst consensus. It reflects the business's trajectory rather than its history — relevant when the company has recently restructured, made acquisitions, or is on a clear growth trajectory that LTM understates.</p>
<p><strong>How PE uses both:</strong> Entry multiples in deal letters and market discussions are almost always quoted on LTM to avoid arguments about projection credibility. However, PE buyers internally model on NTM and Year 2 EBITDA to assess whether they are paying a reasonable forward multiple. A business trading at "12x LTM" but "8x NTM" because of a near-term ramp looks much cheaper on a forward basis. The danger: a seller presenting 12x LTM as cheap is implicitly asking you to pay for NTM growth that may not materialise.</p>
<p><strong>Secondaries relevance:</strong> GP NAV marks are almost always LTM-based. When rates rise and trading comps compress, the LTM multiple a GP is using may still reflect pre-rate-rise market levels — making the mark stale. Secondary buyers adjust aggressively for this.</p>`,
        s: `It is verifiable, auditable, and does not require forecasting assumptions — making it the defensible baseline for deal pricing in discussions with sellers and banks.`,

        q: 'How do you value a business with negative EBITDA or minimal profitability in a PE context?',
        a: `<p>EBITDA multiples become meaningless when EBITDA is negative or negligible. PE uses alternative metrics depending on the business model:</p>
<p><strong>Revenue multiples (EV/Revenue):</strong> Most common for SaaS and high-growth businesses. A business with £5M ARR growing 80% YoY at 80% gross margins might trade at 8–15x ARR even with negative EBITDA, because investors are buying future earning power, not current profits.</p>
<p><strong>Gross profit multiples (EV/Gross Profit):</strong> Useful when businesses have meaningfully different cost structures below the gross profit line — strips out R&D and S&M investment that is discretionary and temporary.</p>
<p><strong>Unit economics and cohort analysis:</strong> CAC payback period, LTV/CAC ratio, net revenue retention. A business with 130% NRR and 6-month CAC payback is deeply valuable even with negative overall EBITDA — existing cohorts are generating cash; losses are from investing in growth.</p>
<p><strong>DCF on path-to-profitability:</strong> Model the business reaching scale and EBITDA breakeven in Year 3–4, then apply a terminal EBITDA multiple. Highly sensitive to assumptions — stress-test the timeline and terminal margin aggressively.</p>
<p><strong>PE caution:</strong> Negative-EBITDA businesses are hard to LBO in the traditional sense — there is no cash flow to service debt. These deals are typically structured as growth equity (minority or majority, all-equity or very low leverage) rather than traditional buyouts.</p>`,

      {
        q: 'How do you determine the right entry multiple to pay in an LBO? Walk through your framework.',
        a: `<p>The entry multiple determines how much equity you need and directly sets the hurdle for generating returns. The right framework:</p>
<p><strong>Step 1 — LBO the deal backwards (afford-to-pay analysis):</strong> Start with your target IRR (say 20%). Model the expected exit EBITDA, exit multiple, and debt paydown. Solve for the maximum entry price that still delivers 20% IRR. This gives you your "walk-away" price — what you can afford to pay without compromising returns.</p>
<p><strong>Step 2 — Market calibration:</strong> Where are comparable public companies trading (EV/EBITDA)? What did similar businesses sell for in recent precedent transactions? The entry multiple must be defensible relative to the market — paying 14x when comps trade at 10x requires a very specific justification (superior growth profile, synergies, unique assets).</p>
<p><strong>Step 3 — Stress testing:</strong> Run the model at entry multiple −2x and entry multiple −4x, with flat EBITDA and no debt paydown. If even the bear case generates acceptable returns, the price is robust. If returns require optimistic assumptions to work, the deal is underwriting sentiment, not fundamentals.</p>
<p><strong>Step 4 — Qualitative judgment:</strong> Are you the right owner? Do you have a differentiated value creation plan that justifies paying more than a financial buyer without operational expertise? In competitive auctions, the right answer is sometimes "pass" rather than chase a price that only works in the bull case.</p>`,

      {
        q: 'Why might a company choose to issue debt rather than equity?',
        a: `<p>This is a core capital structure question. Companies prefer debt over equity for several reasons:</p>
<p><strong>Tax shield:</strong> Interest payments are tax-deductible, reducing the effective cost of debt. If a company pays £10M of interest and the tax rate is 25%, the real after-tax cost is only £7.5M. Equity dividends are not tax-deductible — no equivalent benefit.</p>
<p><strong>No dilution:</strong> Issuing equity dilutes existing shareholders — they own a smaller percentage of the company. Debt does not dilute ownership. If management and existing shareholders believe the business is undervalued, they would rather borrow than sell equity cheaply.</p>
<p><strong>Lower cost of capital:</strong> Debt is cheaper than equity because debtholders have a senior claim on assets in bankruptcy — lower risk means they accept lower returns. WACC typically falls as leverage increases (up to a point).</p>
<p><strong>Signal of confidence:</strong> Choosing debt signals that management believes FCF will comfortably cover interest — a positive signal to the market. Equity issuances can signal management thinks the stock is overvalued, sometimes causing a share price decline.</p>
<p><strong>When equity is preferred:</strong> If the company is already heavily levered; if cash flows are volatile (high risk of missing debt service); if a large acquisition requires flexibility; or if financial distress risk is meaningful. The optimal capital structure balances the tax shield benefit against financial distress costs.</p>`,

      {
        q: 'What could a company do with excess cash on the balance sheet?',
        a: `<p>Excess cash — cash above what the business needs to operate — represents uninvested capital earning minimal returns. Management has several options:</p>
<p><strong>Return to shareholders:</strong> (1) <em>Dividends</em> — regular or special cash distributions. Signals financial health but commits to future payouts. (2) <em>Share buybacks</em> — repurchase own shares, reducing share count and increasing EPS. More flexible than dividends; can be timed opportunistically. Preferred in the US; dividends more common in Europe.</p>
<p><strong>Reinvest in the business:</strong> (1) <em>Organic capex</em> — build new capacity, expand into new markets. Best option if ROIC > WACC. (2) <em>Acquisitions (M&A)</em> — buy competitors, suppliers, or adjacent businesses. High risk of overpaying; most acquisitions destroy value on a standalone basis but can be justified if synergies are real.</p>
<p><strong>Pay down debt:</strong> Reduces leverage, lowers interest expense, improves financial flexibility, and may improve credit rating — reducing future borrowing costs.</p>
<p><strong>PE perspective:</strong> Excess cash in an LBO target is a direct reduction to the net cost of acquisition (EV − Cash = implied equity value). Sponsors model the cash balance carefully: cash above the minimum operating level is "available cash" that immediately reduces the equity check at close. Post-acquisition, sponsors prefer to use FCF for debt repayment (building equity value) rather than holding cash.</p>`,

        a: `<p>The general ranking is: <strong>Precedent Transactions > Comparable Companies > DCF</strong> — but with important caveats.</p>
<p><strong>Why Precedent Transactions tend to be highest:</strong> They reflect actual prices paid in M&A deals, which include a <em>control premium</em> — the extra price acquirers pay to gain control of a business (typically 20–40% above the standalone market price). They also reflect the deal market at the time, which can be frothy.</p>
<p><strong>Why Comparable Companies (trading comps) are in the middle:</strong> Public market multiples reflect minority, liquid stakes — no control premium, and subject to daily market sentiment. They represent the floor in an M&A negotiation because this is what the seller could achieve by staying public.</p>
<p><strong>Why DCF tends to be lowest:</strong> DCF is driven by assumptions that conservative analysts apply conservatively. Small increases in WACC or reductions in terminal growth rate significantly compress value. In practice, DCF can also be highest if assumptions are aggressive — which is why the ranking is a generalisation not a rule.</p>
<p><strong>Important caveat:</strong> This ranking depends heavily on market conditions, the specific company, and the analyst's assumptions. In a depressed M&A market, precedent transactions might be lower than comps. For high-growth companies, DCF (with bullish assumptions) can far exceed comps. Always present all three and explain the divergence.</p>`,

        q: 'How would you value an apple tree?',
        a: `<p>This is a conceptual question testing whether you can apply valuation frameworks to non-standard assets. The apple tree is a proxy for any cash-flow-generating asset.</p>
<p><strong>DCF approach (most rigorous):</strong> Estimate the annual cash flows — projected apple harvests (units × price per apple) minus costs (water, maintenance, labour, fertiliser). Apply a discount rate reflecting the riskiness of apple production (weather risk, price risk). Calculate a terminal value based on the tree's productive life or a perpetuity if it grows indefinitely. Sum the PV of annual cash flows + PV of terminal value = intrinsic value.</p>
<p><strong>Comparable transactions:</strong> What have similar apple trees of the same variety, age, and location sold for recently? Apply a per-tree or per-acre multiple. This is the "trading comps" equivalent.</p>
<p><strong>Replacement cost / asset approach:</strong> What would it cost to plant and grow a replacement tree to the same maturity and yield? This sets a floor — you would not pay more than the cost to replicate.</p>

<p><strong>The PE framing:</strong> Apply these same four frameworks to any business: DCF of future earnings, comparable company multiples, replacement cost of assets, and option/strategic value. The apple tree question tests whether you instinctively think in cash flows and comparables — which you should.</p>`,

      {
        q: 'What major factors affect the yield on a corporate bond?',
        a: `<p>A corporate bond yield = Risk-Free Rate + Credit Spread. Several factors drive each component:</p>
<p><strong>Risk-free rate:</strong> Government bond yields (10Y Treasury or Gilt) set the base. When central banks raise rates, all bond yields rise — even for high-quality issuers. Duration matters: longer-maturity bonds are more sensitive to rate moves.</p>
<p><strong>Credit quality / probability of default:</strong> The most important company-specific factor. Higher leverage (Net Debt/EBITDA), lower interest coverage, weaker FCF generation, and cyclical revenue all increase perceived default risk → wider credit spread → higher yield. Rated by Moody's/S&P/Fitch: investment grade (BBB– and above) vs high yield (BB+ and below).</p>
<p><strong>Seniority and security:</strong> Senior secured debt (first lien) has first claim on assets in default — lower loss-given-default → lower yield. Subordinated or unsecured debt ranks lower → higher yield required. PIK notes (non-cash interest) carry the highest yield of all.</p>
<p><strong>Liquidity:</strong> Thinly traded bonds require a liquidity premium. Large liquid issues (e.g. major investment-grade corporates) trade at tighter spreads than small or illiquid HY bonds.</p>
<p><strong>Market conditions / risk appetite:</strong> In risk-off environments (recessions, crises), investors flee to safety and credit spreads widen dramatically — even for the same issuer. In benign markets, spreads compress as investors chase yield.</p>
<p><strong>PE relevance:</strong> HY bonds (8–12%+ yields) are used in LBO capital stacks. The all-in yield determines the cash interest burden the portfolio company must service. Rate rises directly increase this cost for floating-rate debt (SOFR-linked TLBs).</p>`,

      {
        q: 'Company A has a P/E of 20; Company B has a P/E of 10. Both are considering acquiring Company C, which trades at a P/E of 15. For which acquirer would the deal be accretive and for which dilutive?',
        a: `<p>In an all-stock deal, a deal is accretive when the acquirer's P/E is <em>higher</em> than the target's, and dilutive when the acquirer's P/E is <em>lower</em>.</p>
<p><strong>Company A (P/E = 20) acquires Company C (P/E = 15): ACCRETIVE.</strong> Company A's stock is more highly valued relative to earnings. Each share of A issued is "worth more" per unit of earnings than the C shares it retires. The combined EPS rises because A is paying a relatively cheap price (15x) using expensive currency (20x). Rule: if acquirer P/E > target P/E → accretive in an all-stock deal.</p>
<p><strong>Company B (P/E = 10) acquires Company C (P/E = 15): DILUTIVE.</strong> Company B must issue shares worth 15x earnings to acquire assets worth 10x earnings. B is paying more per unit of earnings than it generates — combined EPS falls. Rule: if acquirer P/E < target P/E → dilutive in an all-stock deal.</p>
<p><strong>Intuition:</strong> Think of it as exchange rate arbitrage. High P/E companies can use their highly-valued stock as acquisition currency to buy lower P/E earnings cheaply — each share they issue "buys" more earnings than it represents. Low P/E companies face the reverse — they overpay in earnings terms for any acquisition above their own multiple.</p>
<p><strong>Important caveats:</strong> This is the simplified rule for all-stock deals. In practice, synergies, deal financing mix (cash/debt/stock), interest expense on deal debt, and the premium paid all affect accretion/dilution. In PE, EPS accretion/dilution is less relevant — IRR and equity MOIC are the metrics that matter.</p>`,

<p><strong>Cost of Equity (Ke):</strong> Calculated via CAPM: Ke = Rf + β × (Rm − Rf). Risk-free rate (Rf) = 10Y Treasury yield; equity risk premium (Rm − Rf) = 4–6% typically; beta measures the company's systematic risk.</p>
<p><strong>Cost of Debt (Kd):</strong> The yield on the company's debt, after the tax shield (since interest is deductible).</p>`,

      {
        q: 'Why is WACC a theoretically flawed discount rate for a PE-backed LBO company, and what do PE firms use instead?',
        a: `<p>WACC assumes a stable, target capital structure throughout the investment period and uses market-value weights for debt and equity. In an LBO, the capital structure changes dramatically every year as debt is paid down — making a fixed WACC a poor approximation of the true discount rate at each point in time.</p>
<p><strong>The problem:</strong> In Year 1, a highly leveraged LBO might have 65% debt / 35% equity. By Year 5 after aggressive paydown, it might be 30% debt / 70% equity. Using Year 1 weights throughout understates the cost of equity (equity becomes more dominant over time, raising the blended rate) and misrepresents the tax shield value.</p>
<p><strong>What PE firms actually use:</strong> (1) <strong>IRR as the primary metric</strong> — sidesteps WACC entirely by using the internal rate of return on equity cash flows directly; (2) <strong>APV (Adjusted Present Value)</strong> — values the unlevered business separately then adds the PV of the interest tax shield, which changes each year; (3) <strong>Equity DCF at cost of equity</strong> — discounts equity cash flows (levered FCF after all debt service) at the required equity return (20–25% for PE), giving equity value directly.</p>
<p>For practical deal analysis, most PE professionals use IRR and MOIC on the equity cash flows rather than DCF/WACC at all.</p>`,

<p><strong>When to distrust it:</strong> (1) When terminal value represents >75% of total DCF value — you are essentially guessing at a multiple with extra steps; (2) When WACC is below 8% — small errors in the risk-free rate or equity risk premium create enormous value swings; (3) For early-stage or high-growth businesses where Year 5 FCF is driven almost entirely by assumptions rather than current economics; (4) When management has provided the projections — DCF is only as good as the inputs, and management projections systematically overstate growth.</p>
<p><strong>The PE practitioner's view:</strong> DCF is a useful input, not the answer. The LBO model (what a financial buyer can pay to achieve a target return) and market comparables (what strategic buyers and the market are paying) are more actionable. DCF provides a fundamental anchor and helps explain the gap between what you can pay and what the business is worth in different scenarios.</p>`,

<p><strong>Why it matters in an LBO:</strong> The tax shield is one of the core value-creation mechanisms in leveraged finance. By substituting cheap, tax-deductible debt for expensive, non-deductible equity, the PE firm reduces the blended cost of capital (WACC falls) and increases total after-tax cash flow available to all stakeholders. Over a 5-year hold with £500M of debt at 8%, the cumulative tax shield could be £50M+ in cash savings — a meaningful return contributor.</p>

        q: 'How would an asset write-up or write-down affect an LBO model? Walk me through how you adjust the balance sheet.',
        a: `<p>Asset write-ups and write-downs arise in LBO models at close (from purchase price allocation under IFRS 3) and during the hold (from impairment testing under IAS 36). They affect all three statements.</p>
<p><strong>Asset Write-Up at LBO Close (PPA — IFRS 3):</strong> When an LBO closes, IFRS 3 requires writing up acquired assets to fair value. PP&E (IAS 16) and identifiable intangible assets (customer relationships, brand, technology — IAS 38) are stepped up to their acquisition-date fair values. This increases the asset base on the Balance Sheet. These written-up assets are then amortised or depreciated over their useful lives — creating additional non-cash charges on the post-LBO Income Statement that depress reported profit. In the model: add intangible amortisation as an Income Statement expense (reduces EBIT and Net Profit), but add it back in operating cash flows (non-cash). The step-up also creates a DTL (IAS 12) because the accounting carrying amount exceeds the tax base.</p>
<p><strong>Asset Write-Down / Impairment (IAS 36):</strong> If an asset's recoverable amount (higher of value-in-use and fair value less costs to sell) falls below its carrying amount, an impairment charge is recognised. IS: impairment reduces Pre-Tax Profit. CFS: add back the impairment (non-cash). BS: the asset's carrying amount falls by the full impairment; Retained Earnings fall by the after-tax impairment; a deferred tax credit may arise. Under IFRS, Goodwill impairments cannot be reversed once taken (IAS 36 para 124).</p>
<p><strong>Opening Balance Sheet in an LBO model:</strong> At close, the model resets the target's Balance Sheet entirely: (1) eliminate existing equity; (2) remove existing debt; (3) add new LBO debt; (4) write up assets via PPA to fair value; (5) add Goodwill (residual after fair-valuing all identifiable net assets); (6) create DTL (IAS 12); (7) add new equity (sponsor + management). Total Assets must equal Total Liabilities + Equity.</p>
<p><em>GAAP note: The accounting mechanics under US GAAP (ASC 805 / ASC 350) are very similar. The key difference is the US-specific 338(h)(10) tax election, which allows a share acquisition to be treated as an asset purchase for tax — eliminating the DTL and providing immediate tax deductibility of the step-up. This mechanism does not exist under IFRS jurisdictions.</em></p>`,

<p><strong>First Lien Term Loan B (TLB):</strong> The workhorse of large LBOs. Minimal amortisation (~1% per year), bullet maturity (6–7 years). Institutional investor base (CLOs, credit funds). Covenant lite (incurrence only). Floating rate. Can be syndicated and traded.</p>

        a: `<p>A clawback is the GP's obligation to return carry already received if, at the end of the fund's life, the LPs have not received their full preferred return plus return of capital across the entire fund.</p>

    description: 'One of the most important and most tested areas in PE interviews. Interviewers want to know you understand the difference between accounting profit and real cash generation — and exactly where value leaks between the two.',

      {
        q: 'What is EBITDA and why do PE firms use it as the primary valuation metric?',
        a: `<p>EBITDA = Earnings Before Interest, Taxes, Depreciation and Amortisation. Starting from Net Income, you add back: interest expense, tax expense, depreciation, and amortisation.</p>
<p>PE firms use it because: (1) it is <strong>capital structure-neutral</strong> — stripping out interest makes it comparable across companies with different debt levels; (2) it proxies for <strong>operating cash generation</strong> before capex and working capital; (3) it is the standard basis for LBO entry and exit multiples (EV/EBITDA), making it the common language of deal-making; (4) it allows cross-company comparison by removing accounting policy differences (different depreciation lives, different tax jurisdictions).</p>
<p>The key limitation: EBITDA is not cash flow. It ignores capex, working capital movements, taxes actually paid, and debt service. This is why PE firms always analyse the full bridge from EBITDA to free cash flow.</p>`,

        q: 'Walk me through the full bridge from EBITDA to Free Cash Flow.',

= Levered Free Cash Flow (available for discretionary debt repayment, dividends, or accumulation)</div>

      {
        q: 'What is the difference between EBITDA and EBIT? When would you focus on EBIT instead?',
        a: `<p>EBIT = EBITDA minus D&A. It reflects operating profit after accounting for the consumption of long-lived assets.</p>
<p>EBIT is more relevant when: (1) D&A is a meaningful proxy for required capex (i.e. the business must reinvest just to maintain its asset base); (2) comparing businesses with very different asset intensities where EBITDA distorts comparisons; (3) analysing businesses where depreciation is genuinely indicative of economic reality (e.g. mining, where equipment really does wear out and need replacing).</p>
<p>In PE, if capex ≈ D&A, EBIT is a reasonable proxy for operating cash flow. If capex >> D&A (growth investing) or capex << D&A (declining investment), EBITDA overstates or understates cash generation respectively.</p>`,

      {
        q: 'What is EBITDA minus Capex and why is it important in PE?',

<p>It matters in PE because it immediately highlights whether a business can service and repay its LBO debt. A business with £100M EBITDA but £80M capex has only £20M of cash available before working capital and taxes — very different from one with £5M capex and £95M available.</p>
<p>When underwriting an LBO, the ratio of capex to EBITDA (capex intensity) is one of the first things a PE analyst checks. Asset-light businesses (SaaS, insurance, professional services) are preferred LBO candidates precisely because EBITDA − Capex ≈ EBITDA.</p>`,

      {
        q: 'What is working capital and how does it affect cash flow conversion?',
        a: `<p>Net Working Capital (NWC) = Current Operating Assets − Current Operating Liabilities = (Receivables + Inventory) − (Payables + Accruals).</p>
<p>An increase in NWC is a use of cash — the business is funding more receivables or inventory, or paying suppliers faster. A decrease in NWC is a source of cash.</p>
<p>For cash conversion, the key question is: as the business grows, does NWC grow proportionally (consuming cash) or does it stay flat / shrink (releasing cash)? Subscription businesses, for example, often collect cash before delivering the service (negative NWC) — they actually generate cash as they grow. Manufacturers typically have rising inventory and receivables as they grow — their NWC is a cash drag.</p>
<p>In an LBO model, annual working capital changes must be modelled explicitly. Even a small NWC build (e.g. +2% of revenue per year) compounds significantly over a 5-year hold, materially reducing cumulative FCF.</p>`,
        s: `Net Working Capital (NWC) = Current Operating Assets − Current Operating Liabilities = (Receivables + Inventory) − (Payables + Accruals).`,

      {
        q: 'What is cash conversion rate and how do you calculate and interpret it?',
        a: `<div class="formula">Cash Conversion = Free Cash Flow / EBITDA  (or Net Income)</div>
<p>It measures how efficiently EBITDA translates into actual cash. A cash conversion of 80% means £80 of every £100 of EBITDA becomes free cash flow. A rate below 50% suggests significant leakage — likely high capex, working capital build, or substantial cash taxes.</p>
<p>In PE due diligence: (1) calculate historical cash conversion and understand why it is what it is; (2) assess whether it will improve or deteriorate during the hold period; (3) stress-test the LBO model under lower conversion scenarios.</p>
<p>High cash conversion businesses (>80%) are highly attractive LBO candidates because EBITDA growth translates directly into debt repayment capacity. Low cash conversion businesses require more caution — stated EBITDA growth may not actually delever the balance sheet.</p>`,

LFCF = UFCF − Cash Interest − Mandatory Debt Amortisation</div>
<p><strong>UFCF</strong> is debt-free cash flow — it measures what the business generates regardless of how it is financed. Used in DCF valuations (discounted at WACC) and when comparing companies with different capital structures. It answers: "How much cash does this business generate for all capital providers?"</p>
<p><strong>LFCF</strong> is the cash available to equity holders after all debt obligations are met. In an LBO model, LFCF is what drives the "cash sweep" — discretionary debt repayment that increases equity value. It answers: "How much cash does this business generate for the PE sponsor after servicing its debt?"</p>
<p>In PE, LFCF is the operative metric for modelling debt paydown and assessing whether a company can survive its debt burden. UFCF is used when constructing the DCF or comparing the company to unlevered peers.</p>`,

      {
        q: 'Why can a company be highly profitable (strong net income) but have terrible free cash flow? Give real examples.',
        a: `<p>Profitability and cash flow diverge whenever accounting profit does not match cash movements. The main culprits:</p>
<p><strong>1. Capital-intensive businesses:</strong> A company earning £50M net income but investing £120M in capex (new factories, infrastructure) has negative FCF despite strong profits. Think: semiconductor fabs, airlines, rail operators.</p>
<p><strong>2. Rapid growth requiring working capital:</strong> A fast-growing manufacturer earns profits but must fund rising inventory and receivables. Each £1 of new revenue may consume £0.30–0.40 in working capital before it becomes cash. Net income grows; FCF lags by years.</p>
<p><strong>3. Revenue recognised before cash collected:</strong> Long-term contract businesses recognise revenue over time, but if collections are slow (government contracts, construction) the cash arrives much later than the profit.</p>
<p><strong>4. High non-cash revenue:</strong> Companies recognising gains on investments or fair value uplifts show accounting profit with no accompanying cash inflow.</p>
<p><strong>Real PE implication:</strong> This is why PE sponsors perform a rigorous EBITDA-to-FCF bridge in diligence. A company showing 20% EBITDA margins may have 5% FCF margins once capex and working capital are factored in — completely changing the LBO debt capacity analysis.</p>`,
        s: `Capital-intensive businesses: A company earning £50M net income but investing £120M in capex (new factories, infrastructure) has negative FCF despite strong profits.`,

      {
        q: 'What is "adjusted EBITDA" and why should you be sceptical of management\'s adjustments?',
        a: `<p>Adjusted EBITDA starts from reported EBITDA and adds back items management deems "non-recurring" or "non-cash": restructuring charges, M&A transaction costs, management fees, share-based compensation, one-time legal settlements, and increasingly, "synergies not yet realised."</p>
<p><strong>Why to be sceptical:</strong></p>
<p>(1) <strong>Recurring "non-recurrings":</strong> Restructuring charges that appear every year are clearly recurring. Management has every incentive to classify normal business costs as one-time items to inflate the EBITDA on which their deal multiple and carry is based.</p>
<p>(2) <strong>Run-rate adjustments:</strong> "Pro-forma for the full-year impact of the acquisition we did in Q3" assumes the acquired business performs exactly as expected. These adjustments are speculative.</p>
<p>(3) <strong>Cost savings not yet achieved:</strong> Adding back "£10M of costs we plan to cut" before the cuts have happened is aspirational, not real.</p>
<p>(4) <strong>SBC add-back:</strong> Stock-based compensation is genuinely non-cash, but it represents a real economic cost to equity holders (dilution). Adding it back overstates the cash available to service debt.</p>
<p><strong>Best practice:</strong> Always start with reported EBITDA, then assess each adjustment individually. Ask: if I owned this business for 10 years, would this cost appear again? If yes, it's recurring and should stay in.</p>`,

      {
        q: 'How do you calculate maintenance capex vs growth capex, and why does the distinction matter in PE?',
        a: `<p>Total capex = Maintenance capex + Growth capex.</p>
<p><strong>Maintenance capex</strong> is required just to keep the business running at its current level — replacing worn equipment, maintaining IT infrastructure, routine repairs. It is a genuine cost of running the business and should be treated as such when assessing normalised FCF.</p>
<p><strong>Growth capex</strong> is discretionary spending to expand capacity, enter new markets, or build new capabilities. It is an investment choice, not a necessity.</p>
<p><strong>Why it matters in PE:</strong> EBITDA ignores all capex. If a company has £100M EBITDA and spends £60M on capex but claims £50M is "growth," the implication is only £10M must be spent to maintain the business. This is often used to inflate perceived FCF. A buyer relying on that number may be financing a deal on the basis of £90M of FCF when the true maintainable number is £40M.</p>
<p><strong>How to estimate:</strong> (1) Ask management directly, then stress-test with engineers/operators; (2) Look at D&A as a proxy — if capex consistently runs below D&A, either the asset base is shrinking or capex is being underspent; (3) Look at peer companies' capex as a % of revenue or assets; (4) Review historical capex in flat-growth years as a baseline for maintenance.</p>`,

        q: 'What is normalised free cash flow and how do you construct it for an LBO target?',
        a: `<p>Normalised FCF strips out one-time items, working capital aberrations, and non-recurring capex to arrive at the sustainable, through-cycle cash generation of the business. It is the number you should be underwriting your debt capacity against.</p>
<div class="formula">Normalised FCF:

  − Verified recurring adjustments only (no speculative add-backs)
  − Normalised maintenance capex (not depressed/elevated in any single year)

  ± Normalised working capital change (through-cycle average, not a peak-year release)
  = Normalised Unlevered FCF</div>
<p><strong>Key steps in diligence:</strong> (1) Review 3–5 years of historical FCF, not just LTM; (2) Identify whether recent years are representative (COVID distortions, post-acquisition integration costs); (3) Map capex between maintenance and growth carefully; (4) Assess whether working capital is structurally improving (good) or cyclically in a trough (bad — NWC will build as conditions normalise).</p>
<p>The difference between management's adjusted EBITDA and a conservatively underwritten normalised FCF is often the single largest driver of whether an LBO is sensible or reckless.</p>`,

<p><strong>1. Ignores capex intensity:</strong> A £100M EBITDA manufacturer spending £70M on capex is worth far less than a £100M EBITDA software business spending £3M. Applying the same 10x EV/EBITDA multiple to both is wrong.</p>

<p><strong>5. Not meaningful for businesses in investment phase:</strong> For high-growth, pre-profitability businesses, EBITDA is negative or near-zero — revenue multiples or ARR-based metrics are more relevant.</p>

        q: 'What is the difference between EBITDA and owner earnings (Buffett\'s concept)? How does this apply in PE?',

      {
        q: 'How does working capital intensity affect LBO structuring and returns?',
        a: `<p>Working capital (WC) = operating current assets minus operating current liabilities. Its intensity — how much WC the business needs relative to revenue — directly affects FCF generation and therefore how much debt an LBO can support.</p>
<p><strong>High WC businesses (bad for LBOs):</strong> Distributors, manufacturers, project-based services. These businesses tie up large amounts of cash in receivables and inventory. Growing 10% per year might require £15–20M of additional WC annually — cash that cannot be used for debt repayment. Revenue growth consumes cash rather than generating it until the WC investment matures.</p>
<p><strong>Low/negative WC businesses (ideal for LBOs):</strong> SaaS, insurance, subscription media. Customers pay upfront (high deferred revenue, a current liability) before services are delivered. As these businesses grow, they generate MORE cash from WC because liabilities grow faster than assets. This is why PE firms pay premium multiples for subscription and recurring revenue models.</p>
<p><strong>Modelling implication:</strong> Always model WC as a percentage of revenue, separately for each component (DSO for AR, DIO for inventory, DPO for AP). A business with 60-day DSO and 30-day DPO needs £30M of net WC per £180M of revenue. Growing from £180M to £360M revenue requires another £30M of WC — a real cash drain in the model that reduces debt paydown capacity.</p>
<p><strong>Due diligence question:</strong> Ask management "what happens to working capital when you grow 20% per year?" Companies that cannot answer this clearly have not modelled their own cash needs — a significant red flag.</p>`,

        q: 'What is the difference between cash EBITDA and reported EBITDA in a PE context?',
        a: `<p>Reported EBITDA is the accounting figure straight from the P&L. Cash EBITDA adjusts for timing differences between when revenues and costs are recognised versus when cash actually moves.</p>
<p><strong>Key differences:</strong></p>
<p><strong>Deferred Revenue:</strong> If a SaaS company receives £12M upfront for an annual subscription, only £1M/month is recognised in EBITDA — but all £12M cash was received immediately. Cash EBITDA (and CFO) is higher than reported EBITDA during growth phases. This makes SaaS businesses excellent cash generators even when reported profitability looks moderate.</p>
<p><strong>Accrued but unpaid expenses:</strong> Bonuses accrued in the P&L but paid in Q1 of the following year. Reported EBITDA includes the cost; cash EBITDA would adjust for the timing. In a December year-end company, a large accrued bonus may overstate the cash cost in one year and understate it in the next.</p>
<p><strong>Non-cash revenue:</strong> Barter arrangements, related-party transactions at non-market prices, or revenue recognised on long-term contracts that has not been billed. All inflate reported EBITDA without corresponding cash receipts.</p>

      {
        q: 'How do rising interest rates affect PE returns? Walk me through all the channels.',
        a: `<p>Interest rates affect PE through at least four simultaneous channels:</p>
<p><strong>1. LBO debt cost:</strong> Higher base rates (SOFR/SONIA) increase the all-in cost of floating rate term loans directly. A 300bps rise in rates on £500M of floating debt = £15M of additional annual interest, reducing FCF available for debt repayment and potentially breaking interest coverage covenants.</p>

        q: 'If rates rise by 200bps, what happens to EV/EBITDA multiples? Walk through the mechanism.',
        a: `<p>The mechanism runs through both the supply and demand sides of deal pricing:</p>
<p><strong>Demand side (what buyers can pay):</strong> In an LBO, the PE firm needs a minimum IRR (e.g. 20%). Higher debt costs reduce cash flow available to service debt, which reduces the equity return for a given entry price. To maintain the same IRR, the buyer must pay less — entry multiples compress. Mechanically: if debt costs rise 200bps on 5x leverage, the equity return drops materially unless the entry price falls.</p>
<p><strong>Supply side (seller expectations):</strong> If public comps have re-rated down (as they typically do when rates rise), the benchmark for private company valuations falls too. Sellers anchoring to peak multiples face a reality check.</p>

<p><strong>PE firm's affordability:</strong> Higher rates mean more of the company's FCF is consumed by interest. With less FCF for debt repayment, the terminal leverage at exit is higher, reducing equity proceeds. PE firms must either reduce entry leverage, pay a lower price, or accept lower returns.</p>
